<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#040507"/>
      <stop offset="50%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#040507"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#wave)"/>
  <!-- Waveform -->
  <polyline points="0,200 40,195 80,180 120,160 160,140 200,150 240,170 280,130 320,110 360,120 400,100 440,130 480,150 520,120 560,90 600,110 640,140 680,160 720,180 760,190 800,200" stroke="#C7A25A" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Center line -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#BFC5CF" stroke-width="0.5" opacity="0.15"/>
  <!-- Frequency markers -->
  <line x1="200" y1="190" x2="200" y2="210" stroke="#BFC5CF" stroke-width="0.5" opacity="0.2"/>
  <line x1="400" y1="190" x2="400" y2="210" stroke="#BFC5CF" stroke-width="0.5" opacity="0.2"/>
  <line x1="600" y1="190" x2="600" y2="210" stroke="#BFC5CF" stroke-width="0.5" opacity="0.2"/>
  <!-- Signal spike -->
  <line x1="400" y1="100" x2="400" y2="300" stroke="#C7A25A" stroke-width="0.5" opacity="0.3"/>
  <!-- Grid -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#BFC5CF" stroke-width="0.2" opacity="0.05"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#BFC5CF" stroke-width="0.2" opacity="0.05"/>
</svg>
