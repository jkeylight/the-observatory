  <!-- Label -->
  <text x="600" y="760" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">THE MOUNTAIN — CLASSIFIED LOCATION</text>
