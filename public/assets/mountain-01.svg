  <circle cx="400" cy="50" r="0.7" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="550" cy="90" r="1" fill="#F2EFE8" opacity="0.7"/>
  <circle cx="700" cy="70" r="0.9" fill="#BFC5CF" opacity="0.5"/>
  <circle cx="850" cy="110" r="1.2" fill="#F2EFE8" opacity="0.6"/>
