<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#040507"/>
  <!-- Restricted file overlay -->
  <rect x="100" y="100" width="1000" height="600" fill="#081120" opacity="0.3"/>
  <rect x="100" y="100" width="1000" height="600" stroke="#1a2a40" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Classification stamp -->
  <text x="600" y="200" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="14" fill="#B8833B" opacity="0.6" letter-spacing="0.3em">CLASSIFIED</text>
  <!-- Redacted lines -->
  <rect x="200" y="280" width="400" height="12" fill="#0a1520" opacity="0.6"/>
  <rect x="200" y="310" width="500" height="12" fill="#0a1520" opacity="0.6"/>
  <rect x="200" y="340" width="350" height="12" fill="#0a1520" opacity="0.6"/>
  <rect x="200" y="400" width="450" height="12" fill="#0a1520" opacity="0.6"/>
  <rect x="200" y="430" width="380" height="12" fill="#0a1520" opacity="0.6"/>
  <rect x="200" y="460" width="520" height="12" fill="#0a1520" opacity="0.6"/>
  <!-- Access denied -->
  <text x="600" y="560" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#B8833B" opacity="0.4" letter-spacing="0.2em">ACCESS DENIED</text>
  <!-- Warning lines -->
  <line x1="100" y1="100" x2="1100" y2="100" stroke="#B8833B" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="700" x2="1100" y2="700" stroke="#B8833B" stroke-width="2" opacity="0.2"/>
  <!-- Corner markers -->
  <path d="M100,100 L100,140 M100,100 L140,100" stroke="#B8833B" stroke-width="2" opacity="0.3"/>
  <path d="M1100,100 L1100,140 M1100,100 L1060,100" stroke="#B8833B" stroke-width="2" opacity="0.3"/>
  <path d="M100,700 L100,660 M100,700 L140,700" stroke="#B8833B" stroke-width="2" opacity="0.3"/>
  <path d="M1100,700 L1100,660 M1100,700 L1060,700" stroke="#B8833B" stroke-width="2" opacity="0.3"/>
</svg>
