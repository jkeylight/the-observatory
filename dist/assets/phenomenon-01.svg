<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="phenom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#phenom)"/>
  <!-- Convergence rays -->
  <line x1="0" y1="0" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="1200" y1="0" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="800" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="1200" y1="800" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="1200" y1="400" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <line x1="600" y1="800" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.08"/>
  <!-- Center subject -->
  <ellipse cx="600" cy="400" rx="80" ry="160" fill="#0F1A2E" opacity="0.3"/>
  <circle cx="600" cy="300" r="35" fill="#0F1A2E" opacity="0.4"/>
  <!-- Convergence point -->
  <circle cx="600" cy="400" r="6" fill="#C7A25A" opacity="0.9"/>
  <circle cx="600" cy="400" r="20" fill="#C7A25A" opacity="0.15"/>
  <circle cx="600" cy="400" r="50" fill="#C7A25A" opacity="0.05"/>
  <!-- Stars converging -->
  <circle cx="150" cy="150" r="1.5" fill="#F2EFE8" opacity="0.7"/>
  <circle cx="1050" cy="150" r="1.5" fill="#F2EFE8" opacity="0.7"/>
  <circle cx="150" cy="650" r="1.5" fill="#F2EFE8" opacity="0.7"/>
  <circle cx="1050" cy="650" r="1.5" fill="#F2EFE8" opacity="0.7"/>
  <!-- Label -->
  <text x="600" y="760" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">THE PHENOMENON — ALL EVIDENCE CONVERGES</text>
</svg>
