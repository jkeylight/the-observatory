<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="align" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#align)"/>
  <!-- Alignment grid -->
  <line x1="600" y1="0" x2="600" y2="800" stroke="#C7A25A" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#C7A25A" stroke-width="0.5" opacity="0.15"/>
  <!-- Convergence lines -->
  <line x1="200" y1="100" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.1"/>
  <line x1="1000" y1="100" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.1"/>
  <line x1="200" y1="700" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.1"/>
  <line x1="1000" y1="700" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.1"/>
  <line x1="100" y1="400" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.1"/>
  <line x1="1100" y1="400" x2="600" y2="400" stroke="#C7A25A" stroke-width="0.3" opacity="0.1"/>
  <!-- Stars at convergence points -->
  <circle cx="200" cy="100" r="2" fill="#F2EFE8" opacity="0.8"/>
  <circle cx="1000" cy="100" r="2" fill="#F2EFE8" opacity="0.8"/>
  <circle cx="200" cy="700" r="2" fill="#F2EFE8" opacity="0.8"/>
  <circle cx="1000" cy="700" r="2" fill="#F2EFE8" opacity="0.8"/>
  <!-- Center convergence -->
  <circle cx="600" cy="400" r="4" fill="#C7A25A" opacity="0.8"/>
  <circle cx="600" cy="400" r="12" fill="#C7A25A" opacity="0.2"/>
  <circle cx="600" cy="400" r="30" fill="#C7A25A" opacity="0.05"/>
  <!-- Concentric circles -->
  <circle cx="600" cy="400" r="100" stroke="#C7A25A" stroke-width="0.3" fill="none" opacity="0.1"/>
  <circle cx="600" cy="400" r="200" stroke="#C7A25A" stroke-width="0.3" fill="none" opacity="0.08"/>
  <circle cx="600" cy="400" r="300" stroke="#C7A25A" stroke-width="0.3" fill="none" opacity="0.05"/>
  <!-- Scattered stars -->
  <circle cx="150" cy="200" r="0.7" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="350" cy="250" r="0.5" fill="#F2EFE8" opacity="0.3"/>
  <circle cx="850" cy="200" r="0.8" fill="#BFC5CF" opacity="0.5"/>
  <circle cx="1050" cy="300" r="0.6" fill="#F2EFE8" opacity="0.4"/>
  <!-- Label -->
  <text x="600" y="760" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">CELESTIAL ALIGNMENT EVENT</text>
</svg>
