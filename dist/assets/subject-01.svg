<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <radialGradient id="portrait" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="#040507"/>
  <!-- Background architecture -->
  <rect x="100" y="100" width="600" height="800" fill="#081120" opacity="0.3"/>
  <!-- Dome silhouette -->
  <path d="M200,300 Q400,150 600,300" stroke="#1a2a40" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Subject silhouette -->
  <ellipse cx="400" cy="500" rx="120" ry="200" fill="#0F1A2E" opacity="0.4"/>
  <!-- Head -->
  <circle cx="400" cy="350" r="50" fill="#0F1A2E" opacity="0.5"/>
  <!-- Shoulders -->
  <ellipse cx="400" cy="480" rx="80" ry="30" fill="#0F1A2E" opacity="0.4"/>
  <!-- Light beam from above -->
  <polygon points="380,100 420,100 440,500 360,500" fill="#BFC5CF" opacity="0.03"/>
  <!-- Star light on subject -->
  <circle cx="400" cy="320" r="2" fill="#C7A25A" opacity="0.6"/>
  <circle cx="400" cy="320" r="8" fill="#C7A25A" opacity="0.1"/>
  <!-- Observer frame lines -->
  <line x1="100" y1="100" x2="100" y2="900" stroke="#1a2a40" stroke-width="0.5" opacity="0.2"/>
  <line x1="700" y1="100" x2="700" y2="900" stroke="#1a2a40" stroke-width="0.5" opacity="0.2"/>
  <!-- Stars -->
  <circle cx="200" cy="180" r="0.8" fill="#F2EFE8" opacity="0.5"/>
  <circle cx="350" cy="160" r="1" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="500" cy="170" r="0.7" fill="#F2EFE8" opacity="0.6"/>
  <circle cx="600" cy="185" r="0.9" fill="#BFC5CF" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="960" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">THE SUBJECT — AURORA VELASQUEZ</text>
</svg>
