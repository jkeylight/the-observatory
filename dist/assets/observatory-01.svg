<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="dome" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a40"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="#040507"/>
  <!-- Dome interior -->
  <ellipse cx="600" cy="300" rx="400" ry="250" fill="url(#dome)"/>
  <!-- Dome ribs -->
  <path d="M200,300 Q600,100 1000,300" stroke="#1a2a40" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M250,320 Q600,140 950,320" stroke="#1a2a40" stroke-width="0.5" fill="none" opacity="0.2"/>
  <path d="M300,340 Q600,180 900,340" stroke="#1a2a40" stroke-width="0.5" fill="none" opacity="0.15"/>
  <!-- Telescope structure -->
  <line x1="600" y1="200" x2="600" y2="600" stroke="#BFC5CF" stroke-width="1" opacity="0.2"/>
  <line x1="500" y1="400" x2="700" y2="400" stroke="#BFC5CF" stroke-width="0.5" opacity="0.15"/>
  <circle cx="600" cy="400" r="30" stroke="#BFC5CF" stroke-width="0.5" fill="none" opacity="0.2"/>
  <circle cx="600" cy="400" r="60" stroke="#BFC5CF" stroke-width="0.3" fill="none" opacity="0.1"/>
  <!-- Stars through dome opening -->
  <circle cx="520" cy="180" r="1" fill="#F2EFE8" opacity="0.8"/>
  <circle cx="600" cy="150" r="1.5" fill="#F2EFE8" opacity="0.9"/>
  <circle cx="680" cy="175" r="0.8" fill="#F2EFE8" opacity="0.7"/>
  <circle cx="560" cy="200" r="0.6" fill="#BFC5CF" opacity="0.5"/>
  <circle cx="640" cy="195" r="0.7" fill="#BFC5CF" opacity="0.6"/>
  <!-- Floor -->
  <rect x="200" y="600" width="800" height="200" fill="#0a1520"/>
  <line x1="200" y1="600" x2="1000" y2="600" stroke="#1a2a40" stroke-width="1" opacity="0.3"/>
  <!-- Label -->
  <text x="600" y="760" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">THE OBSERVATORY — DOME INTERIOR</text>
</svg>
