<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="nightsky" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#081120"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#nightsky)"/>
  <!-- Dense star field -->
  <circle cx="50" cy="50" r="0.5" fill="#F2EFE8" opacity="0.4"/>
  <circle cx="120" cy="80" r="0.8" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="200" cy="30" r="0.6" fill="#F2EFE8" opacity="0.5"/>
  <circle cx="280" cy="90" r="1" fill="#BFC5CF" opacity="0.7"/>
  <circle cx="350" cy="60" r="0.7" fill="#F2EFE8" opacity="0.4"/>
  <circle cx="430" cy="40" r="0.9" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="510" cy="70" r="0.5" fill="#F2EFE8" opacity="0.5"/>
  <circle cx="590" cy="35" r="1.1" fill="#BFC5CF" opacity="0.7"/>
  <circle cx="670" cy="85" r="0.6" fill="#F2EFE8" opacity="0.4"/>
  <circle cx="750" cy="55" r="0.8" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="830" cy="25" r="0.7" fill="#F2EFE8" opacity="0.5"/>
  <circle cx="910" cy="75" r="1" fill="#BFC5CF" opacity="0.7"/>
  <circle cx="990" cy="45" r="0.5" fill="#F2EFE8" opacity="0.4"/>
  <circle cx="1070" cy="65" r="0.9" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="1150" cy="30" r="0.6" fill="#F2EFE8" opacity="0.5"/>
  <!-- More stars -->
  <circle cx="80" cy="150" r="0.7" fill="#BFC5CF" opacity="0.3"/>
  <circle cx="180" cy="180" r="0.5" fill="#F2EFE8" opacity="0.4"/>
  <circle cx="300" cy="160" r="0.8" fill="#BFC5CF" opacity="0.5"/>
  <circle cx="420" cy="140" r="0.6" fill="#F2EFE8" opacity="0.3"/>
  <circle cx="540" cy="170" r="0.9" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="660" cy="150" r="0.7" fill="#F2EFE8" opacity="0.4"/>
  <circle cx="780" cy="130" r="0.5" fill="#BFC5CF" opacity="0.3"/>
  <circle cx="900" cy="160" r="0.8" fill="#F2EFE8" opacity="0.5"/>
  <circle cx="1020" cy="145" r="0.6" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="1140" cy="175" r="0.7" fill="#F2EFE8" opacity="0.3"/>
  <!-- Constellation lines -->
  <line x1="120" y1="80" x2="280" y2="90" stroke="#C7A25A" stroke-width="0.3" opacity="0.2"/>
  <line x1="280" y1="90" x2="430" y2="40" stroke="#C7A25A" stroke-width="0.3" opacity="0.2"/>
  <line x1="430" y1="40" x2="590" y2="35" stroke="#C7A25A" stroke-width="0.3" opacity="0.2"/>
  <line x1="590" y1="35" x2="750" y2="55" stroke="#C7A25A" stroke-width="0.3" opacity="0.2"/>
  <!-- Nebula glow -->
  <ellipse cx="600" cy="400" rx="300" ry="150" fill="#0F1A2E" opacity="0.3"/>
  <ellipse cx="550" cy="380" rx="200" ry="100" fill="#081120" opacity="0.2"/>
  <!-- Milky way band -->
  <path d="M0,400 Q300,350 600,380 Q900,410 1200,370" stroke="#BFC5CF" stroke-width="40" fill="none" opacity="0.02"/>
  <!-- Label -->
  <text x="600" y="760" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">STAR ARCHIVE — CELESTIAL RECORDS</text>
</svg>
