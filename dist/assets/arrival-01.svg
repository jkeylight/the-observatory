<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#040507"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#C7A25A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#040507" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="120" cy="80" r="1" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="340" cy="120" r="0.8" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="560" cy="60" r="1.2" fill="#BFC5CF" opacity="0.7"/>
  <circle cx="780" cy="140" r="0.7" fill="#BFC5CF" opacity="0.5"/>
  <circle cx="900" cy="90" r="1" fill="#BFC5CF" opacity="0.6"/>
  <circle cx="1050" cy="110" r="0.9" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="200" cy="200" r="0.6" fill="#F2EFE8" opacity="0.3"/>
  <circle cx="450" cy="180" r="1.1" fill="#F2EFE8" opacity="0.5"/>
  <circle cx="680" cy="220" r="0.8" fill="#BFC5CF" opacity="0.4"/>
  <circle cx="1000" cy="200" r="1" fill="#F2EFE8" opacity="0.6"/>
  <!-- Cloud layer -->
  <ellipse cx="600" cy="500" rx="800" ry="120" fill="#081120" opacity="0.4"/>
  <ellipse cx="400" cy="520" rx="600" ry="80" fill="#0F1A2E" opacity="0.3"/>
  <!-- Mountain silhouette -->
  <polygon points="0,650 200,480 400,520 600,420 800,500 1000,460 1200,550 1200,800 0,800" fill="#040507"/>
  <!-- Observatory dome -->
  <rect x="560" y="410" width="80" height="50" fill="#081120"/>
  <path d="M560,410 Q600,370 640,410" fill="#0F1A2E" stroke="#1a2a40" stroke-width="1"/>
  <!-- Observatory light -->
  <circle cx="600" cy="400" r="4" fill="#C7A25A" opacity="0.8"/>
  <circle cx="600" cy="400" r="12" fill="#C7A25A" opacity="0.15"/>
  <circle cx="600" cy="400" r="24" fill="#C7A25A" opacity="0.05"/>
  <!-- Label -->
  <text x="600" y="760" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="10" fill="#BFC5CF" opacity="0.4" letter-spacing="0.2em">ARRIVAL — REMOTE OBSERVATORY</text>
</svg>
